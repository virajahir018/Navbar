<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="

    <title>Navbar</title>
</head>

<body>

    <nav>
        <img src="image/logo.png" alt="" height="100px">

        <ul>

            <li><i class="fa-solid fa-house"></i> Home</li>
            <li><i class="fa-solid fa-soap"></i> Product</li>
            <li><i class="fa-solid fa-location-dot"></i> Location</li>
            <li><i class="fa-solid fa-phone"></i> Contact</li>
        </ul>

        <div>

            <div class="toggle" id="toggle"><i class="fa-solid fa-bars"></i></div>
            <button>Sign In</button>
        </div>
    </nav>

    <script src="script.js"></script>

</body>

</html>
